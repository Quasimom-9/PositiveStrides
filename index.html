<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positive Strides Stakes - Horse Race Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #1a2940 0%, #243a56 40%, #1e3348 100%);
    font-family: Candara, 'Trebuchet MS', Georgia, serif;
    color: white; overflow-x: hidden;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes winnerGlow { 0%,100%{box-shadow:0 0 20px rgba(91,143,202,0.3)} 50%{box-shadow:0 0 40px rgba(91,143,202,0.6)} }

  .header {
    background: linear-gradient(90deg, #2a4a72, #3a6a9e, #2a4a72);
    border-bottom: 3px solid #7ab3e0;
    padding: 14px 24px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-circle {
    width: 44px; height: 44px; border-radius: 50%;
    background: #3a6a9e; border: 2px solid #7ab3e0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; color: #7ab3e0; }
  .header-subtitle { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-badge { display: none; align-items: center; gap: 6px; }
  .live-badge.active { display: flex; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff5555; animation: pulse 1s infinite; }
  .live-text { font-size: 11px; font-weight: 700; color: #ff6666; letter-spacing: 2px; font-family: monospace; }

  .main-content {
    padding: 16px 20px; display: flex; gap: 16px;
    flex-wrap: wrap; max-width: 1250px; margin: 0 auto;
  }
  .track-section { flex: 1 1 600px; min-width: 0; }
  .track-container {
    background: rgba(0,0,0,0.25); border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(122,179,224,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .track-container svg { width: 100%; height: auto; display: block; }

  .progress-bar-container {
    margin-top: 10px; background: rgba(0,0,0,0.25); border-radius: 8px;
    padding: 8px 14px; display: none; align-items: center; gap: 10px;
  }
  .progress-bar-container.active { display: flex; }
  .progress-label { font-size: 10px; color: rgba(255,255,255,0.5); font-family: monospace; white-space: nowrap; }
  .progress-track { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #5b8fca, #7ab3e0); border-radius: 3px; transition: width 0.3s; }
  .progress-pct { font-size: 11px; color: #7ab3e0; font-weight: 700; font-family: monospace; }

  .commentary-box {
    margin-top: 12px; background: rgba(0,0,0,0.3); border-radius: 10px;
    padding: 12px 16px; border: 1px solid rgba(122,179,224,0.15);
    min-height: 160px; max-height: 280px; overflow-y: auto;
  }
  .commentary-label { font-size: 9px; letter-spacing: 3px; color: #7ab3e0; font-weight: 700; margin-bottom: 8px; font-family: monospace; text-transform: uppercase; }
  .commentary-line { font-size: 13px; font-style: italic; margin-bottom: 5px; line-height: 1.4; }
  .commentary-line.latest { color: white; font-weight: 700; animation: slideIn 0.4s ease; }

  .sidebar { flex: 0 0 240px; }
  .leaderboard {
    background: rgba(20,40,65,0.95); border-radius: 10px;
    padding: 12px 14px; border: 1px solid rgba(122,179,224,0.3);
  }
  .leaderboard-title {
    font-size: 11px; font-weight: 800; color: #7ab3e0;
    letter-spacing: 2px; margin-bottom: 10px; text-align: center;
    text-transform: uppercase; border-bottom: 1px solid rgba(122,179,224,0.3); padding-bottom: 8px;
  }
  .lb-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; margin-bottom: 3px; border-radius: 6px; transition: all 0.5s ease; }
  .lb-row.leader { background: rgba(122,179,224,0.12); }
  .lb-pos { font-size: 13px; font-weight: 900; width: 20px; text-align: center; font-family: monospace; }
  .lb-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .lb-name { font-size: 12px; font-weight: 700; flex: 1; }
  .lb-gap { font-size: 9px; color: rgba(255,255,255,0.4); font-family: monospace; }

  .odds-panel {
    margin-top: 14px; background: rgba(20,40,65,0.95); border-radius: 10px;
    padding: 12px 14px; border: 1px solid rgba(122,179,224,0.3);
  }
  .odds-title {
    font-size: 11px; font-weight: 800; color: #e8a84c;
    letter-spacing: 2px; margin-bottom: 10px; text-align: center;
    text-transform: uppercase; border-bottom: 1px solid rgba(232,168,76,0.3); padding-bottom: 8px;
  }
  .odds-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; margin-bottom: 2px; font-size: 11px; }
  .odds-num { font-weight: 900; color: rgba(255,255,255,0.4); font-family: monospace; width: 14px; }
  .odds-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .odds-name { flex: 1; color: rgba(255,255,255,0.7); }
  .odds-val { font-weight: 900; color: #e8a84c; font-family: monospace; min-width: 40px; text-align: right; }
  .odds-payout { font-size: 9px; color: rgba(255,255,255,0.4); font-family: monospace; min-width: 50px; text-align: right; }

  .btn-area { margin-top: 14px; }
  .race-btn {
    width: 100%; padding: 14px; font-size: 14px; font-weight: 900;
    letter-spacing: 2px; color: white;
    background: linear-gradient(135deg, #3a6a9e, #5b8fca);
    border: none; border-radius: 10px; cursor: pointer;
    font-family: Candara, Georgia, serif; text-transform: uppercase;
    box-shadow: 0 4px 16px rgba(91,143,202,0.3); transition: all 0.2s;
  }
  .race-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(91,143,202,0.5); }
  .race-btn:active { transform: translateY(0); }
  .race-status {
    display: none; text-align: center; padding: 14px; font-size: 13px;
    color: #7ab3e0; font-weight: 700; letter-spacing: 1px;
    background: rgba(91,143,202,0.08); border-radius: 10px;
    border: 1px solid rgba(91,143,202,0.2);
  }
  .audio-toggle {
    width: 100%; padding: 10px; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; color: white;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    cursor: pointer; font-family: Candara, Georgia, serif;
    text-transform: uppercase; transition: all 0.2s; margin-top: 8px;
  }
  .audio-toggle:hover { background: rgba(255,255,255,0.15); }
  .audio-toggle.on { border-color: #7ab3e0; color: #7ab3e0; background: rgba(91,143,202,0.1); }

  .post-positions {
    margin-top: 14px; background: rgba(0,0,0,0.2); border-radius: 10px;
    padding: 10px 12px; border: 1px solid rgba(255,255,255,0.05);
  }
  .pp-title { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 700; margin-bottom: 8px; text-align: center; }
  .pp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10px; }
  .pp-num { font-weight: 900; color: rgba(255,255,255,0.4); font-family: monospace; width: 14px; }
  .pp-body-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pp-silk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pp-name { color: rgba(255,255,255,0.6); }

  .finish-panel { display: none; max-width: 750px; margin: 0 auto; padding: 0 20px 30px; }
  .finish-panel.active { display: block; }
  .finish-inner {
    background: linear-gradient(135deg, #1a3050 0%, #2a4a72 100%);
    border-radius: 14px; padding: 24px; border: 2px solid #7ab3e0;
    margin: 16px 0; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: winnerGlow 2s infinite;
  }
  .finish-header-label { font-size: 10px; letter-spacing: 4px; color: #7ab3e0; font-weight: 700; text-transform: uppercase; font-family: monospace; margin-bottom: 4px; }
  .finish-header-title { font-size: 22px; font-weight: 900; }
  .podium { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
  .podium-card { text-align: center; padding: 16px 20px; border-radius: 12px; min-width: 120px; }
  .podium-medal { font-size: 32px; margin-bottom: 6px; }
  .podium-img {
    width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 8px;
    overflow: hidden; border: 3px solid; background: rgba(0,0,0,0.3);
  }
  .podium-img img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }
  .podium-name { font-size: 16px; font-weight: 900; }
  .podium-label { font-size: 9px; letter-spacing: 2px; font-weight: 700; margin-top: 4px; }
  .podium-payout { font-size: 11px; color: #e8a84c; font-weight: 700; margin-top: 4px; }
  .rest-of-field { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
  .rest-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px; color: rgba(255,255,255,0.5); font-size: 12px; }
  .rest-pos { font-weight: 900; width: 20px; font-family: monospace; }
  .rest-img { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; border: 2px solid; background: rgba(0,0,0,0.2); flex-shrink: 0; }
  .rest-img img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

  .footer {
    text-align: center; padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
  }
  .race-count { font-size: 10px; color: rgba(255,255,255,0.4); font-family: monospace; }

  @media (max-width: 700px) {
    .main-content { flex-direction: column; }
    .sidebar { flex: 1 1 100%; }
    .header-title { font-size: 14px; }
    .podium-img { width: 70px; height: 70px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-circle">🐴</div>
    <div>
      <div class="header-title">POSITIVE STRIDES STAKES</div>
      <div class="header-subtitle">Preakness-Style Championship Race</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge" id="liveBadge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
    <div class="race-count" id="raceCount"></div>
  </div>
</div>
<div class="main-content">
  <div class="track-section">
    <div class="track-container" id="trackContainer"></div>
    <div class="progress-bar-container" id="progressBar">
      <span class="progress-label">RACE PROGRESS</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="commentary-box">
      <div class="commentary-label">📢 Race Commentary</div>
      <div id="commentaryList"></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="leaderboard">
      <div class="leaderboard-title">Live Standings</div>
      <div id="leaderboardList"></div>
    </div>
    <div class="odds-panel" id="oddsPanel">
      <div class="odds-title">🎰 Morning Line Odds</div>
      <div id="oddsList"></div>
    </div>
    <div class="btn-area">
      <button class="race-btn" id="startBtn" onclick="startRace()">🏇 Start Race</button>
      <div class="race-status" id="raceStatus">🏇 Race In Progress...</div>
      <button class="audio-toggle" id="audioToggle" onclick="toggleAudio()">🔇 Commentary Audio: OFF</button>
    </div>
    <div class="post-positions" id="postPositions"></div>
  </div>
</div>
<div class="finish-panel" id="finishPanel">
  <div class="finish-inner">
    <div style="text-align:center;margin-bottom:16px;">
      <div class="finish-header-label">📸 Photo Finish</div>
      <div class="finish-header-title">Official Results</div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="rest-of-field" id="restOfField"></div>
  </div>
</div>
<div class="footer">POSITIVE STRIDES CENTER • THERAPEUTIC RIDING • EST. 40 YEARS</div>

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function fmt(t,h1,h2,h3,last){
  let r=t;
  if(h1)r=r.replace(/{h1}/g,h1);
  if(h2)r=r.replace(/{h2}/g,h2);
  if(h3)r=r.replace(/{h3}/g,h3);
  if(last)r=r.replace(/{last}/g,last);
  return r;
}
function shuffle(a){let arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function getPoint(t,lane){
  const a=t*Math.PI*2-Math.PI/2;
  return{x:CX+(RX-lane*LW)*Math.cos(a),y:CY+(RY-lane*LW)*Math.sin(a)};
}

// --- ODDS & BETTING ---
function generateOdds(){
  // Generate random odds for each horse
  const rawPower = HORSES.map(()=> 1 + Math.random()*9); // 1-10 random power
  const total = rawPower.reduce((a,b)=>a+b,0);
  currentOdds = HORSES.map((h,i)=>{
    // Convert to betting odds (lower power = longer odds = bigger payout)
    const winProb = rawPower[i]/total;
    const rawOdds = (1/winProb)-1;
    // Round to common racing odds
    let odds;
    if(rawOdds < 1) odds = {n:Math.max(1,Math.round(rawOdds*5)), d:5, str:"", val:rawOdds};
    else if(rawOdds < 3) odds = {n:Math.round(rawOdds*2), d:2, str:"", val:rawOdds};
    else odds = {n:Math.round(rawOdds), d:1, str:"", val:rawOdds};
    odds.str = odds.n+"/"+odds.d;
    // $2 win payout
    odds.payout = (2 * (odds.n/odds.d + 1)).toFixed(2);
    return {id:h.id, name:h.name, odds:odds, power:rawPower[i]};
  });
  currentOdds.sort((a,b)=>a.odds.val - b.odds.val); // sort by favorite
}

function renderOdds(){
  let html='';
  currentOdds.forEach(o=>{
    const h=HORSES[o.id];
    html+=`<div class="odds-row"><span class="odds-num">${o.id+1}</span><div class="odds-dot" style="background:${h.silkColor};border:1.5px solid ${h.silkAccent}"></div><span class="odds-name">${o.name}</span><span class="odds-val">${o.odds.str}</span><span class="odds-payout">$${o.odds.payout}</span></div>`;
  });
  document.getElementById('oddsList').innerHTML=html;
}

// --- TTS ---
function speak(text){
  if(!audioEnabled||!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=1.1;u.pitch=1.05;u.volume=0.9;
  const voices=window.speechSynthesis.getVoices();
  const pref=voices.find(v=>v.name.includes('Daniel')||v.name.includes('Alex')||v.name.includes('Google UK English Male'));
  if(pref)u.voice=pref;
  window.speechSynthesis.speak(u);
}
function toggleAudio(){
  audioEnabled=!audioEnabled;
  const btn=document.getElementById('audioToggle');
  if(audioEnabled){btn.textContent='🔊 Commentary Audio: ON';btn.classList.add('on');if('speechSynthesis' in window){window.speechSynthesis.getVoices();speak("Audio commentary is now on.");}}
  else{btn.textContent='🔇 Commentary Audio: OFF';btn.classList.remove('on');if('speechSynthesis' in window)window.speechSynthesis.cancel();}
}

// --- RACE ---
function startRace(){
  postOrder=shuffle([0,1,2,3,4,5,6]);
  generateOdds();

  // Use odds to slightly bias basePower but with lots of randomness
  raceHorses=HORSES.map(h=>{
    const oddsInfo=currentOdds.find(o=>o.id===h.id);
    const powerBias=oddsInfo?oddsInfo.power/10:0.5; // 0.1-1.0

    // Assign race strategy: front-runner, stalker, or closer
    const strategy=Math.random();
    let earlySpeed,midSpeed,lateSpeed;
    if(strategy<0.3){
      // Front-runner: fast start, fades late
      earlySpeed=0.9+Math.random()*0.3;
      midSpeed=0.8+Math.random()*0.2;
      lateSpeed=0.6+Math.random()*0.3;
    } else if(strategy<0.7){
      // Stalker: steady throughout
      earlySpeed=0.7+Math.random()*0.3;
      midSpeed=0.8+Math.random()*0.3;
      lateSpeed=0.8+Math.random()*0.3;
    } else {
      // Closer: slow start, big finish (Secretariat potential)
      earlySpeed=0.5+Math.random()*0.3;
      midSpeed=0.7+Math.random()*0.3;
      lateSpeed=1.0+Math.random()*0.4;
    }

    // 10% chance of a Secretariat-style horse
    let isSecretariat=false;
    if(Math.random()<0.10){
      lateSpeed=1.3+Math.random()*0.3;
      isSecretariat=true;
    }

    return{
      id:h.id, progress:0,
      earlySpeed, midSpeed, lateSpeed,
      burstCooldown:0,
      basePower:0.7+powerBias*0.5+Math.random()*0.3,
      cornerSkill:0.85+Math.random()*0.3,
      isSecretariat,
      lastProgress:0,
    };
  });

  raceState="running";raceCount++;startTime=Date.now();finishOrder=[];
  lastCommentTime=Date.now();cTriggers=new Set();lastLeaderId=-1;
  lastTickTime=Date.now();
  comms=[pick(C.start)];

  document.getElementById('startBtn').style.display='none';
  document.getElementById('raceStatus').style.display='block';
  document.getElementById('liveBadge').classList.add('active');
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('finishPanel').classList.remove('active');
  document.getElementById('raceCount').textContent=`Race #${raceCount}`;

  buildPostPositions();
  renderOdds();
  renderCommentary();
  speak(comms[0]);
  renderLeaderboard();
  renderTrack();

  if(animFrame)cancelAnimationFrame(animFrame);
  tick();
}

function tick(){
  if(raceState!=="running")return;
  const now_t=Date.now();
  const elapsed=now_t-startTime;
  const dt=Math.min((now_t-lastTickTime)/1000,0.1);
  lastTickTime=now_t;
  const progress=Math.min(elapsed/RACE_DUR,1);
  document.getElementById('progressFill').style.width=Math.round(progress*100)+'%';
  document.getElementById('progressPct').textContent=Math.round(progress*100)+'%';

  raceHorses=raceHorses.map(h=>{
    h.lastProgress=h.progress;
    const noise=(Math.sin(elapsed*0.0008+h.id*1.7)*0.12+Math.sin(elapsed*0.003+h.id*3.1)*0.08+Math.sin(elapsed*0.007+h.id*5.3)*0.05)*0.6;

    // Phase-based speed: use early/mid/late speeds
    let phaseSpeed;
    if(progress<0.33) phaseSpeed=h.earlySpeed;
    else if(progress<0.66) phaseSpeed=h.midSpeed + (h.midSpeed-h.earlySpeed)*0.2; // transition
    else {
      phaseSpeed=h.lateSpeed;
      // Secretariat effect: accelerate dramatically in final stretch
      if(h.isSecretariat && progress>0.75){
        phaseSpeed *= 1 + (progress-0.75)*1.5;
      }
    }

    // Additional random surges for lead changes
    let surge=0;
    if(Math.random()<0.008*dt*60){
      surge=0.3+Math.random()*0.4; // random burst
    }

    const tp=h.progress%1;
    const ic=(tp>0.15&&tp<0.35)||(tp>0.65&&tp<0.85);
    const cp=ic?(1-(1-h.cornerSkill)*0.3):1;

    const basePerSec=TOTAL_LAPS/(RACE_DUR/1000);
    const eff=h.basePower*phaseSpeed*(1+noise+surge)*cp;
    let np=h.progress+basePerSec*dt*eff;

    if(Math.random()<0.0002*dt*60&&h.burstCooldown<=0){
      const burstProg = Math.min(h.progress+basePerSec*dt*2, TOTAL_LAPS);
      if(burstProg >= TOTAL_LAPS && h.progress < TOTAL_LAPS && !finishOrder.includes(h.id)){
        finishOrder.push(h.id);
        const pos = finishOrder.length;
        const posLabel = pos===1?'1st':pos===2?'2nd':pos===3?'3rd':pos+'th';
        addComment(`${HORSES[h.id].name} crosses the finish line in ${posLabel} place!`);
      }
      return{...h,progress:burstProg,burstCooldown:3};
    }
    const newProg = Math.min(np, TOTAL_LAPS);
    // Record finish position when a horse first crosses the line
    if(newProg >= TOTAL_LAPS && h.progress < TOTAL_LAPS && !finishOrder.includes(h.id)){
      finishOrder.push(h.id);
      const pos = finishOrder.length;
      const posLabel = pos===1?'1st':pos===2?'2nd':pos===3?'3rd':pos+'th';
      addComment(`${HORSES[h.id].name} crosses the finish line in ${posLabel} place!`);
    }
    return{...h,progress:newProg,burstCooldown:Math.max(0,(h.burstCooldown||0)-dt)};
  });

  // --- COMMENTARY ENGINE ---
  const now=now_t;
  if(now-lastCommentTime>3500){
    const sorted=[...raceHorses].sort((a,b)=>b.progress-a.progress);
    const h1=HORSES[sorted[0].id].name;
    const h2=HORSES[sorted[1].id].name;
    const h3=HORSES[sorted[2].id].name;
    const last=HORSES[sorted[6].id].name;
    const ct=cTriggers;

    const currentLeader=sorted[0].id;

    // Lead change detection
    if(lastLeaderId>=0&&currentLeader!==lastLeaderId&&progress>0.08){
      const newLeader=HORSES[currentLeader].name;
      addComment(fmt(pick(C.leadChange),newLeader,HORSES[lastLeaderId].name));
      lastLeaderId=currentLeader;
      lastCommentTime=now;
    }
    // Secretariat detection
    else if(progress>0.78){
      const leader=sorted[0];
      const gap=(leader.progress-sorted[1].progress)*100;
      if(leader.isSecretariat&&gap>1.5&&!ct.has("sec")){
        ct.add("sec");
        addComment(fmt(pick(C.secretariat),HORSES[leader.id].name));
        lastCommentTime=now;
      }
    }

    // Phase commentary
    if(now-lastCommentTime>3500){
      if(progress<0.06&&!ct.has("gb")){ct.add("gb");addComment(fmt(pick(C.gateBreak),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.06&&progress<0.11&&!ct.has("ep1")){ct.add("ep1");addComment(fmt(pick(C.earlyPack),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.11&&progress<0.16&&!ct.has("ep2")){ct.add("ep2");addComment(fmt(pick(C.earlyPack),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.16&&progress<0.22&&!ct.has("ft1")){ct.add("ft1");addComment(fmt(pick(C.firstTurn),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.22&&progress<0.27&&!ct.has("ft2")){ct.add("ft2");const mh=HORSES[sorted[Math.floor(Math.random()*3)+3].id].name;addComment(fmt(pick(C.midField),mh,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.27&&progress<0.33&&!ct.has("bs1")){ct.add("bs1");addComment(fmt(pick(C.backstretch),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.33&&progress<0.38&&!ct.has("bs2")){ct.add("bs2");addComment(fmt(pick(C.backstretch),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.38&&progress<0.43&&!ct.has("mm1")){ct.add("mm1");const mv=HORSES[sorted[Math.floor(Math.random()*3)+2].id].name;addComment(fmt(pick(C.midMove),mv,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.43&&progress<0.48&&!ct.has("mf1")){ct.add("mf1");const mh=HORSES[sorted[Math.floor(Math.random()*3)+3].id].name;addComment(fmt(pick(C.midField),mh,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.48&&progress<0.53&&!ct.has("mb1")){ct.add("mb1");const gap=((sorted[0].progress-sorted[1].progress)*100);if(gap<0.4)addComment(fmt(pick(C.midBattle),h1,h2,h3,last));else addComment(fmt(pick(C.backstretch),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.53&&progress<0.58&&!ct.has("mm2")){ct.add("mm2");const mv=HORSES[sorted[Math.floor(Math.random()*3)+1].id].name;addComment(fmt(pick(C.midMove),mv,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.58&&progress<0.63&&!ct.has("mf2")){ct.add("mf2");const mh=HORSES[sorted[Math.floor(Math.random()*2)+4].id].name;addComment(fmt(pick(C.midField),mh,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.63&&progress<0.68&&!ct.has("fn1")){ct.add("fn1");addComment(fmt(pick(C.farTurn),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.68&&progress<0.73&&!ct.has("fn2")){ct.add("fn2");addComment(fmt(pick(C.farTurn),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.73&&progress<0.78&&!ct.has("es1")){ct.add("es1");addComment(fmt(pick(C.earlyStretch),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.78&&progress<0.82&&!ct.has("sb1")){ct.add("sb1");const gap=((sorted[0].progress-sorted[1].progress)*100);if(gap<0.5)addComment(fmt(pick(C.stretchBattle),h1,h2,h3,last));else addComment(fmt(pick(C.earlyStretch),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.82&&progress<0.86&&!ct.has("sc1")){ct.add("sc1");const cl=sorted.slice(2,5);const fastest=cl.reduce((a,b)=>(b.progress-b.lastProgress)>(a.progress-a.lastProgress)?b:a,cl[0]);addComment(fmt(pick(C.stretchClose),HORSES[fastest.id].name,h1,h3,last));lastCommentTime=now;}
      else if(progress>=0.86&&progress<0.90&&!ct.has("sb2")){ct.add("sb2");addComment(fmt(pick(C.stretchBattle),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.90&&progress<0.94&&!ct.has("fs1")){ct.add("fs1");addComment(fmt(pick(C.finalStrides),h1,h2,h3,last));lastCommentTime=now;}
      else if(progress>=0.94&&!ct.has("fs2")){ct.add("fs2");addComment(fmt(pick(C.finalStrides),h1,h2,h3,last));lastCommentTime=now;}
    }

    lastLeaderId=currentLeader;
  }

  renderTrack();
  renderLeaderboard();

  if(raceHorses.every(h=>h.progress>=TOTAL_LAPS)){
    raceState="finished";
    const fo=[...raceHorses].sort((a,b)=>b.progress-a.progress);
    const wn=HORSES[fo[0].id].name,sn=HORSES[fo[1].id].name,tn=HORSES[fo[2].id].name;
    addComment(fmt(pick(C.finish),wn,sn,tn));
    setTimeout(()=>{addComment(fmt(pick(C.postRace),wn,sn,tn));},3000);
    showFinishReplay(fo);
    document.getElementById('raceStatus').style.display='none';
    document.getElementById('liveBadge').classList.remove('active');
    document.getElementById('progressBar').classList.remove('active');
    const btn=document.getElementById('startBtn');
    btn.textContent='🔄 Race Again';
    btn.style.display='block';
    return;
  }
  animFrame=requestAnimationFrame(tick);
}

// Init
raceHorses=HORSES.map(h=>({id:h.id,progress:0,speed:0,energy:100,basePower:1,earlySpeed:1,midSpeed:1,lateSpeed:1,cornerSkill:1,burstCooldown:0,lastProgress:0,isSecretariat:false}));
generateOdds();
comms=[pick(C.preRace)];
buildPostPositions();
renderOdds();
renderTrack();
renderLeaderboard();
renderCommentary();
if('speechSynthesis' in window) window.speechSynthesis.getVoices();
</script>
</body>
</html>
